<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>999 PRO Terminal - Панель оператора</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <meta name="theme-color" content="#0a0a0f">
</head>
<body>
    <!-- Background -->
    <div class="bg-container">
        <div class="bg-gradient"></div>
        <div class="bg-noise"></div>
        <div class="bg-grid"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" onclick="toggleTheme()">
        <svg class="theme-toggle-icon" id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <span class="theme-toggle-text" id="themeText">День</span>
    </div>

    <!-- Main Panel -->
    <div class="panel-container">
        <!-- Header -->
        <header class="panel-header glass-strong">
            <div class="header-left">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                        <path d="M7 7h10M7 12h10M7 17h6"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="brand-name"><span class="number">999</span> <span class="pro">PRO</span></span>
                    <span class="logo-subtitle">Система приема заказов</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span>Система активна</span>
                </div>
            </div>
        </header>

        <!-- QR Section -->
        <section class="qr-section glass-strong">
            <div class="qr-wrapper">
                <img src="/qrcode" alt="QR Code" class="qr-image" id="qrImage">
            </div>
            <p class="qr-label">Отсканируйте для отправки файлов</p>
            <p class="qr-url" id="qrUrl">http://{{ local_ip }}:8000/send</p>
            <div class="qr-hint">📱 Откройте камеру телефона и наведите на QR-код</div>
        </section>

        <!-- Orders List -->
        <section class="orders-section glass-strong">
            <div class="orders-header">
                <h2 class="orders-title">
                    Входящие заказы
                    <span class="orders-count" id="ordersCount">0</span>
                </h2>
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput" 
                        placeholder="Поиск по имени или ID..."
                        oninput="searchOrders()"
                    >
                </div>
            </div>
            <div class="orders-list" id="ordersList">
                <!-- Orders will be rendered here -->
            </div>
        </section>

        <!-- Order Detail -->
        <section class="detail-section glass-strong">
            <div class="detail-header">
                <h3 class="detail-title">Детали заказа</h3>
            </div>
            <div class="detail-content" id="detailContent">
                <div class="detail-empty" id="detailEmpty">
                    <svg class="detail-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <p>Выберите заказ для просмотра</p>
                </div>
                <div class="detail-info hidden" id="detailInfo">
                    <div class="detail-row">
                        <span class="detail-label">Клиент</span>
                        <span class="detail-value" id="detailName"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">ID заказа</span>
                        <span class="detail-value text-accent" id="detailId"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Дата</span>
                        <span class="detail-value" id="detailDate"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Время</span>
                        <span class="detail-value" id="detailTime"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Файлов</span>
                        <span class="detail-value" id="detailFileCount"></span>
                    </div>
                    <div class="detail-files">
                        <p class="files-title">Файлы:</p>
                        <div class="file-list" id="fileList"></div>
                    </div>
                    <div class="detail-actions">
                        <button class="btn btn-primary" onclick="openFolder()">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            </svg>
                            Открыть папку
                        </button>
                        <button class="btn btn-danger" onclick="deleteOrder()">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                            Удалить
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Audio for notification -->
    <audio id="notificationSound" preload="auto">
        <source src="/static/sounds/notification.wav" type="audio/wav">
    </audio>

    <script src="/static/js/panel.js"></script>
</body>
</html>
